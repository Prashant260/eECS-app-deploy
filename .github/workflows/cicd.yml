name: Deploy to ECS

on:
 push:
 branches:
- main

env:
AWS_REGION: ap-south-1
ECR_REPOSITORY: two-tier-app-backend
ECS_CLUSTER: two-tier-app-cluster
ECS_SERVICE: two-tier-app-backend-service

jobs:
deploy:
runs-on: ubuntu-latest


steps:
  - name: Checkout code
    uses: actions/checkout@v4

  # 🔐 Configure AWS (using access keys - simpler for now)
  - name: Configure AWS credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ env.AWS_REGION }}

  # 🔑 Login to ECR
  - name: Login to Amazon ECR
    id: login-ecr
    uses: aws-actions/amazon-ecr-login@v2

  # 🐳 Build and push image
  - name: Build and Push Docker Image
    run: |
      docker build -t $ECR_REPOSITORY:latest .
      docker tag $ECR_REPOSITORY:latest ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest
      docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest

  # 🚀 Deploy to ECS
  - name: Deploy to ECS
    run: |
      aws ecs update-service \
        --cluster $ECS_CLUSTER \
        --service $ECS_SERVICE \
        --force-new-deployment
