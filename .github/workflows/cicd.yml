on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      action:
        description: "apply or destroy"
        required: true
        default: "apply"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
  env:
     ACTION: ${{ github.event.inputs.action || 'apply' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔐 Configure AWS (using OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::179832230574:role/cicd-oidc
          aws-region: "ap-south-1"

      # 🏗️ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 🚀 Initialize and Apply Terraform
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Plan
        if: env.ACTION == 'apply'
        working-directory: ./terraform
        run: terraform plan

      - name: Terraform Apply
        if: env.ACTION == 'apply'
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: env.ACTION == 'destroy'
        run: terraform destroy -auto-approve

      # 🔑 Login to ECR
      - name: Login to Amazon ECR
        if: env.ACTION == 'apply'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 🐳 Build and push image
      - name: Build and Push Docker Image
        if: env.ACTION == 'apply'
        run: |
          docker build -t ${{ secrets.ECR_REPOSITORY }}:latest -f app/Dockerfile ./app
          docker tag ${{ secrets.ECR_REPOSITORY }}:latest ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

      # 🚀 Deploy to ECS
      - name: Deploy to ECS
        if: env.ACTION == 'apply'
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment
